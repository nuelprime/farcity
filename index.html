<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<title>farcastadt</title>
<!-- Mini App embed. If your deployed URL isn't farcastadt.vercel.app, change the 3 URLs below to match. -->
<meta name="fc:miniapp" content='{"version":"1","imageUrl":"https://farcastadt.vercel.app/og.png","button":{"title":"enter your city","action":{"type":"launch_miniapp","name":"farcastadt","url":"https://farcastadt.vercel.app","splashImageUrl":"https://farcastadt.vercel.app/icon.png","splashBackgroundColor":"#160f29"}}}' />

<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:#160f29;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#efeafe;}
  #app{position:relative;height:100vh;height:100dvh;display:flex;flex-direction:column;}
  header{display:flex;align-items:center;gap:10px;padding:14px 16px 8px;}
  header h1{font-size:16px;font-weight:600;margin:0;letter-spacing:.2px;}
  .badge{font-size:10px;color:#8479ad;border:1px solid #352a55;padding:2px 7px;border-radius:99px;text-transform:uppercase;letter-spacing:.5px;}
  .controls{display:flex;flex-wrap:wrap;gap:8px;padding:0 16px 10px;align-items:center;}
  .seg{display:inline-flex;background:#1d1536;border:1px solid #352a55;border-radius:10px;padding:3px;}
  .seg button{border:0;background:transparent;color:#b3a9d6;font-size:13px;padding:6px 11px;border-radius:7px;cursor:pointer;font-weight:500;}
  .seg button.on{background:#7c63d4;color:#fff;}
  .hint{font-size:11px;color:#8479ad;}
  .sharebtn{margin-left:auto;border:0;background:#7c63d4;color:#fff;font-size:13px;font-weight:600;padding:7px 15px;border-radius:10px;cursor:pointer;}
  .sharebtn.ghost{margin-left:8px;background:#1d1536;border:1px solid #352a55;color:#b3a9d6;font-weight:500;}
  #stage{flex:1;position:relative;}
  canvas{display:block;width:100%;height:100%;touch-action:none;cursor:grab;}
  #panel{position:absolute;left:12px;right:12px;bottom:12px;background:rgba(29,21,54,.92);backdrop-filter:blur(8px);
    border:1px solid #352a55;border-radius:16px;padding:12px 15px;font-size:13px;color:#b3a9d6;}
  #panel b{color:#efeafe;font-weight:600;}
</style>

<body>
<div id="app">
  <header><h1>your city</h1><span class="badge" id="mode-badge">loading&#8230;</span>
    <button id="share" class="sharebtn">share</button>
    <button id="cancelshare" class="sharebtn ghost" style="display:none">cancel</button>
  </header>
  <div class="controls">
    <div class="seg" id="scope">
      <button data-s="mutual" class="on">mutual</button>
      <button data-s="inbound">inbound</button>
      <button data-s="outbound">outbound</button>
    </div>
    <div class="seg" id="rot"><button data-r="-1">&#8634;</button><button data-r="1">&#8635;</button></div>
    <div class="seg" id="frame"><button data-m="6" class="on">6 mo</button><button data-m="7">7 mo</button></div>
    <span class="hint">drag to pan · scroll to zoom · turn with &#8634; &#8635; · tap a building</span>
  </div>
  <div id="stage"><canvas id="city"></canvas><div id="panel"></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
<script>
(async function(){
/* 1. FARCASTER (demo mode if SDK can't load) */
let sdk=null, viewer=null;
try { const mod = await import('https://esm.sh/@farcaster/miniapp-sdk'); sdk = mod.sdk; } catch(e){}
if (sdk) {
  try { const cx = await Promise.race([sdk.context, new Promise(r=>setTimeout(()=>r(null),4000))]); viewer = cx?.user ?? null; } catch(e){}
  try { await Promise.race([sdk.actions.ready(), new Promise(r=>setTimeout(r,3000))]); } catch(e){}
}

/* 2. DATA — STEP 2 changes only this. */
/* Bots/accounts to keep out of everyone's city. Add FIDs and/or @handles (lowercase, no @). */
const BANNED_FIDS=new Set([ /* e.g. 123456 */ ]);
const BANNED_HANDLES=new Set(["casteragents"]);
async function loadCity(viewer){
  const API="https://farcastadt.vercel.app";
  const urlFid=new URLSearchParams(location.search).get("fid");
  const MY_FID=viewer?.fid || (urlFid?Number(urlFid):0) || 310953;   /* in Farcaster = the viewer; ?fid=N for testing; else default */
  const badge=document.getElementById("mode-badge");

  function DEMO(){
    const demo=[["dwr",[22,70,12,5],[18,40,8,3],8],["v",[19,55,10,4],[15,35,7,2],19],
      ["jessepollak",[16,48,14,2],[14,38,9,3],3],["linda",[14,40,6,3],[12,30,5,2],52],
      ["ted",[11,33,5,2],[10,24,4,2],27],["woj",[9,28,4,1],[8,20,3,1],95],
      ["antimo",[8,22,3,2],[6,16,2,2],14],["limone",[6,18,4,1],[5,12,3,1],140],
      ["deodad",[5,14,2,1],[4,10,1,1],40],["kugusha",[4,11,2,0],[3,8,1,1],310],
      ["jacek",[3,8,1,1],[2,6,1,0],22],["ace",[2,6,1,0],[2,4,1,0],600],
      ["cassie",[2,5,1,0],[1,3,1,0],11],["mert",[2,4,1,0],[1,3,0,0],75],
      ["phil",[1,4,0,1],[1,2,0,0],180],["nat",[1,3,1,0],[1,2,0,0],33],
      ["yb",[1,3,0,0],[0,2,0,0],420],["sds",[1,2,1,0],[0,1,0,0],9],
      ["july",[1,2,0,0],[0,1,0,0],260],["proxy",[0,2,0,1],[0,1,0,0],50],
      ["greg",[0,1,1,0],[0,1,0,0],500],["zach",[0,1,0,0],[0,1,0,0],17]];
    const KK=["replies","likes","recasts","mentions"],obj=a=>Object.fromEntries(KK.map((k,i)=>[k,a[i]]));
    return demo.map(([h,i,o,lm])=>({handle:h,fid:null,inbound:obj(i),outbound:obj(o),lastActiveMinutes:lm}));
  }
  function fetchT(url,ms){const c=new AbortController(),t=setTimeout(()=>c.abort(),ms||22000);
    return fetch(url,{signal:c.signal}).finally(()=>clearTimeout(t));}

  /* one cached call to our serverless function, which does the node work once and caches it */
  try{
    const r=await fetchT(`${API}/api/city?fid=${MY_FID}`,22000);
    if(!r.ok)throw new Error("api "+r.status);
    const j=await r.json();
    if(!j||j.source==="demo"||!Array.isArray(j.people)||!j.people.length){if(badge)badge.textContent="demo (node error)";return DEMO();}
    if(badge)badge.textContent="live";
    owner=j.me||null; if(owner&&owner.pfp)avatarImg(owner.pfp);
    return j.people;
  }catch(err){
    console.warn("[farcity] city api failed:",err.message);
    if(badge)badge.textContent="demo (node error)";
    return DEMO();
  }
}

/* 3. SCORING + LIGHTING */
const W={replies:3,recasts:2,mentions:2,likes:1};
let scope="mutual";
function bucket(p){const i=p.inbound,o=p.outbound;if(scope==="inbound")return i;if(scope==="outbound")return o;
  return {replies:i.replies+o.replies,likes:i.likes+o.likes,recasts:i.recasts+o.recasts,mentions:i.mentions+o.mentions};}
function score(p){const b=bucket(p);return b.replies*W.replies+b.recasts*W.recasts+b.mentions*W.mentions+b.likes*W.likes;}
const litRatio=m=>Math.max(0.05,1-Math.floor(m/30)*0.17);
const ago=m=>{if(m>=9000)return"a while ago";if(m<60)return m+"m ago";const h=Math.round(m/60);if(h<24)return h+"h ago";const d=Math.round(h/24);return d<14?d+"d ago":Math.round(d/7)+"w ago";};

/* 4. RENDERER */
const cv=document.getElementById("city"),panel=document.getElementById("panel");let ctx=cv.getContext("2d");
const TW=54,TH=27,FOOT=0.54,X0=-9,X1=9,Y0=-9,Y1=9,MAX_CITY=50;
let people=[],allPeople=[],windowMonths=6,dpr=1,CW=0,CH=0,off={x:0,y:0},dragBase={x:0,y:0},hit=[],sel=null,hov=null,zoom=0.8,rot=0;
let shareMode=false;const highlights=new Set();let owner=null;
const PAL=[[124,99,212],[92,118,210],[110,86,196],[88,76,170],[60,140,150],[140,96,180]];
const PLUM=[150,86,160];
const sh=(c,f)=>`rgb(${Math.min(255,c[0]*f|0)},${Math.min(255,c[1]*f|0)},${Math.min(255,c[2]*f|0)})`;
const tier=r=>r<0.12?0:r<0.30?1:r<0.55?2:r<0.80?3:4;
const K=["replies","likes","recasts","mentions"];
const DIRS=[[1,0],[-1,0],[0,1],[0,-1]];

let seed=98765;const rng=()=>{seed=(seed*1103515245+12345)&0x7fffffff;return seed/0x7fffffff;};
const blocks=[];
(function bsp(x0,y0,x1,y1,d){const w=x1-x0+1,h=y1-y0+1;
  if((w<=2&&h<=2)||(Math.max(w,h)<=3&&rng()<0.45)||d>8){blocks.push([x0,y0,x1,y1]);return;}
  let vert=w>h?true:w<h?false:rng()<0.5;
  if(vert){if(w<3){blocks.push([x0,y0,x1,y1]);return;}const s=x0+1+Math.floor(rng()*(w-2));bsp(x0,y0,s-1,y1,d+1);bsp(s+1,y0,x1,y1,d+1);}
  else{if(h<3){blocks.push([x0,y0,x1,y1]);return;}const s=y0+1+Math.floor(rng()*(h-2));bsp(x0,y0,x1,s-1,d+1);bsp(x0,s+1,x1,y1,d+1);}
})(X0,Y0,X1,Y1,0);
const plotSet=new Set(),plots=[];
blocks.forEach(([x0,y0,x1,y1])=>{for(let gx=x0;gx<=x1;gx++)for(let gy=y0;gy<=y1;gy++){const k=gx+","+gy;if(!plotSet.has(k)){plotSet.add(k);plots.push([gx,gy]);}}});
const isPlot=(x,y)=>plotSet.has(x+","+y);
const inArea=(x,y)=>x>=X0&&x<=X1&&y>=Y0&&y<=Y1;
const isRoad=(x,y)=>inArea(x,y)&&!isPlot(x,y);

function findYou(){let best=null,bd=1e9;
  for(let gx=X0;gx<X1;gx++)for(let gy=Y0;gy<Y1;gy++){
    if(isPlot(gx,gy)&&isPlot(gx+1,gy)&&isPlot(gx,gy+1)&&isPlot(gx+1,gy+1)){
      const d=(gx+0.5)*(gx+0.5)+(gy+0.5)*(gy+0.5);if(d<bd){bd=d;best=[gx,gy];}}}
  return best;}
const you2=findYou();
const youCells=you2?[[you2[0],you2[1]],[you2[0]+1,you2[1]],[you2[0],you2[1]+1],[you2[0]+1,you2[1]+1]]
  :[plots.reduce((a,b)=>((b[0]*b[0]+b[1]*b[1])<(a[0]*a[0]+a[1]*a[1])?b:a),plots[0])];
const youSet=new Set(youCells.map(c=>c[0]+","+c[1]));
const YMINX=Math.min(...youCells.map(c=>c[0])),YMAXX=Math.max(...youCells.map(c=>c[0])),
      YMINY=Math.min(...youCells.map(c=>c[1])),YMAXY=Math.max(...youCells.map(c=>c[1]));
const YCX=(YMINX+YMAXX)/2, YCY=(YMINY+YMAXY)/2;
const carve=new Set();
function carveDir(sx,sy,dx,dy){let x=sx,y=sy;for(let step=0;step<4;step++){
  if(!inArea(x,y)||isRoad(x,y))break; carve.add(x+","+y);plotSet.delete(x+","+y); x+=dx;y+=dy;}}
carveDir(YMINX,YMINY-1,0,-1); carveDir(YMINX,YMAXY+1,0,1);
carveDir(YMINX-1,YMINY,-1,0); carveDir(YMAXX+1,YMINY,1,0);
const plaza=new Set();
for(let x=YMINX-1;x<=YMAXX+1;x++)for(let y=YMINY-1;y<=YMAXY+1;y++){const k=x+","+y;
  if(!inArea(x,y)||youSet.has(k)||carve.has(k))continue; if(plotSet.has(k))plaza.add(k);}
const avail=plots.filter(c=>plotSet.has(c[0]+","+c[1])&&!youSet.has(c[0]+","+c[1])&&!plaza.has(c[0]+","+c[1]));

let feats=[];
function assign(){
  const mv=Math.max(1,...people.map(score));
  const order=[...people.keys()].filter(i=>score(people[i])>0).sort((a,b)=>(((a*73+11)&255)-((b*73+11)&255)));
  const cells=[...avail].sort((a,b)=>(((a[0]-YCX)**2+(a[1]-YCY)**2)-((b[0]-YCX)**2+(b[1]-YCY)**2)));
  const blocked=new Set(),placed=new Set();let ci=0;
  people.forEach(p=>p.cell=null);
  order.forEach(idx=>{const p=people[idx];
    while(ci<cells.length&&blocked.has(cells[ci][0]+","+cells[ci][1]))ci++;
    if(ci>=cells.length)return;
    const cell=cells[ci];ci++;p.cell=cell;const kk=cell[0]+","+cell[1];blocked.add(kk);placed.add(kk);
    if(tier(score(p)/mv)>=3)DIRS.forEach(([dx,dy])=>blocked.add((cell[0]+dx)+","+(cell[1]+dy)));});
  feats=[];let wc=0;
  cells.forEach(c=>{const kk=c[0]+","+c[1];if(placed.has(kk))return;
    const r=(c[0]*31+c[1]*17)&7,w=(c[0]*13+c[1]*29)&31;
    if(r===0)feats.push([c,"tree"]);else if(w===0&&wc<2){feats.push([c,"water"]);wc++;}});}

function rotc(gx,gy){switch(((rot%4)+4)%4){case 1:return[gy,-gx];case 2:return[-gx,-gy];case 3:return[-gy,gx];}return[gx,gy];}
const baseO=()=>({x:CW/2,y:CH*0.42});
const origin=()=>({x:baseO().x+off.x,y:baseO().y+off.y});
const iso=(gx,gy)=>{const r=rotc(gx,gy),o=origin();return {x:o.x+(r[0]-r[1])*TW*zoom/2,y:o.y+(r[0]+r[1])*TH*zoom/2};};
const depth=(gx,gy)=>{const r=rotc(gx,gy);return r[0]+r[1];};

function sky(){const g=ctx.createLinearGradient(0,0,0,CH);
  g.addColorStop(0,"#160f29");g.addColorStop(.5,"#241640");g.addColorStop(1,"#39265e");
  ctx.fillStyle=g;ctx.fillRect(0,0,CW,CH);ctx.fillStyle="#fff";
  for(let i=0;i<70;i++){ctx.globalAlpha=0.12+((i*37)%10)/18;ctx.fillRect((i*73.3)%CW,(i*129.1)%(CH*0.34),1.3,1.3);}
  ctx.globalAlpha=1;ctx.beginPath();ctx.arc(CW*0.9,CH*0.11,17,0,7);ctx.fillStyle="#f3ecd0";ctx.fill();
  ctx.beginPath();ctx.arc(CW*0.875,CH*0.09,17,0,7);ctx.fillStyle="#241640";ctx.fill();}
function diamond(c,hw,hh){ctx.beginPath();ctx.moveTo(c.x,c.y-hh);ctx.lineTo(c.x+hw,c.y);ctx.lineTo(c.x,c.y+hh);ctx.lineTo(c.x-hw,c.y);ctx.closePath();}
function tile(gx,gy){const c=iso(gx,gy);diamond(c,TW*zoom/2,TH*zoom/2);
  if(isRoad(gx,gy)){ctx.fillStyle="#241d3a";ctx.fill();}
  else{ctx.fillStyle="rgba(124,99,212,0.05)";ctx.fill();ctx.strokeStyle="rgba(124,99,212,0.12)";ctx.lineWidth=1;ctx.stroke();}}
function stripe(gx,gy){if(!isRoad(gx,gy))return;ctx.strokeStyle="rgba(222,200,120,0.26)";ctx.lineWidth=1.3;ctx.setLineDash([5,6]);
  if(isRoad(gx-1,gy)&&isRoad(gx+1,gy)){const a=iso(gx-0.5,gy),b=iso(gx+0.5,gy);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}
  if(isRoad(gx,gy-1)&&isRoad(gx,gy+1)){const a=iso(gx,gy-0.5),b=iso(gx,gy+0.5);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}
  ctx.setLineDash([]);}
function water(gx,gy){const c=iso(gx,gy);diamond(c,TW*zoom*0.42,TH*zoom*0.42);ctx.fillStyle="#2c456f";ctx.fill();
  ctx.fillStyle="rgba(150,190,235,0.35)";ctx.beginPath();ctx.ellipse(c.x-4*zoom,c.y-2*zoom,5*zoom,2*zoom,0,0,7);ctx.fill();}
function tree(gx,gy){const c=iso(gx,gy);ctx.fillStyle="#2c5c3a";ctx.beginPath();ctx.ellipse(c.x,c.y-7*zoom,6*zoom,8*zoom,0,0,7);ctx.fill();
  ctx.fillStyle="#3a724a";ctx.beginPath();ctx.ellipse(c.x-2*zoom,c.y-9*zoom,4*zoom,5*zoom,0,0,7);ctx.fill();}
function windows(P0,P1,P3,rows,cols,s0,ratio){let s=s0;const rnd=()=>{s=(s*9301+49297)%233280;return s/233280;};
  const up={x:P3.x-P0.x,y:P3.y-P0.y};
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){const u0=(c+0.28)/cols,u1=(c+0.72)/cols,v0=(r+0.3)/rows,v1=(r+0.7)/rows;
    const a={x:P0.x+(P1.x-P0.x)*u0,y:P0.y+(P1.y-P0.y)*u0},b={x:P0.x+(P1.x-P0.x)*u1,y:P0.y+(P1.y-P0.y)*u1};
    const c0={x:a.x+up.x*v0,y:a.y+up.y*v0},c1={x:b.x+up.x*v0,y:b.y+up.y*v0},c2={x:b.x+up.x*v1,y:b.y+up.y*v1},c3={x:a.x+up.x*v1,y:a.y+up.y*v1};
    ctx.beginPath();ctx.moveTo(c0.x,c0.y);ctx.lineTo(c1.x,c1.y);ctx.lineTo(c2.x,c2.y);ctx.lineTo(c3.x,c3.y);ctx.closePath();
    ctx.fillStyle=(rnd()<ratio)?"rgba(255,214,140,0.92)":"rgba(16,11,28,0.55)";ctx.fill();}}

function building(gx,gy,h,col,tr,id,ratio){
  const c=iso(gx,gy),fw=TW*zoom*FOOT,fh=TH*zoom*FOOT,H=h*zoom;
  const d={t:{x:c.x,y:c.y-fh/2},r:{x:c.x+fw/2,y:c.y},b:{x:c.x,y:c.y+fh/2},l:{x:c.x-fw/2,y:c.y}};
  const tp={t:{x:d.t.x,y:d.t.y-H},r:{x:d.r.x,y:d.r.y-H},b:{x:d.b.x,y:d.b.y-H},l:{x:d.l.x,y:d.l.y-H}};
  const hl=sel===id||hov===id,rows=Math.max(2,Math.round(h/24)),cols=tr>=2?3:2;
  if(ratio>0.83){ctx.save();ctx.globalAlpha=0.15;ctx.fillStyle="#ffd98c";ctx.beginPath();ctx.ellipse(c.x,c.y,fw*0.95,fh*0.95,0,0,7);ctx.fill();ctx.restore();}
  ctx.beginPath();ctx.moveTo(d.l.x,d.l.y);ctx.lineTo(d.b.x,d.b.y);ctx.lineTo(tp.b.x,tp.b.y);ctx.lineTo(tp.l.x,tp.l.y);ctx.closePath();
  ctx.fillStyle=sh(col,hl?0.92:0.62);ctx.fill();windows(d.l,d.b,tp.l,rows,cols,id*7+1,ratio);
  ctx.beginPath();ctx.moveTo(d.b.x,d.b.y);ctx.lineTo(d.r.x,d.r.y);ctx.lineTo(tp.r.x,tp.r.y);ctx.lineTo(tp.b.x,tp.b.y);ctx.closePath();
  ctx.fillStyle=sh(col,hl?1.18:0.88);ctx.fill();windows(d.b,d.r,tp.b,rows,cols,id*13+5,ratio);
  ctx.beginPath();ctx.moveTo(tp.t.x,tp.t.y);ctx.lineTo(tp.r.x,tp.r.y);ctx.lineTo(tp.b.x,tp.b.y);ctx.lineTo(tp.l.x,tp.l.y);ctx.closePath();
  ctx.fillStyle=sh(col,hl?1.42:1.12);ctx.fill();ctx.strokeStyle="rgba(255,255,255,0.1)";ctx.lineWidth=1;ctx.stroke();
  if(tr>=3){const ap={x:c.x,y:c.y-H-(tr>=4?20:13)*zoom};ctx.strokeStyle=sh(col,1.3);ctx.lineWidth=1.4;
    ctx.beginPath();ctx.moveTo(c.x,c.y-H);ctx.lineTo(ap.x,ap.y);ctx.stroke();
    ctx.beginPath();ctx.arc(ap.x,ap.y,(tr>=4?3.3:2.5)*zoom,0,7);ctx.fillStyle=ratio>0.83?"#ff7a9c":"#5a4a7a";ctx.fill();}
  const topY=c.y-H-fh/2-(tr>=3?20*zoom:0);
  hit.push({id,x:c.x-(fw+8)/2,y:topY,w:fw+8,h:(c.y+fh/2)-topY});}

function drawYouBlock(){const c=iso(YCX,YCY),hw=TW*zoom,hh=TH*zoom,H=28*zoom,hl=sel===-1;
  const d={t:{x:c.x,y:c.y-hh},r:{x:c.x+hw,y:c.y},b:{x:c.x,y:c.y+hh},l:{x:c.x-hw,y:c.y}};
  const tp={t:{x:d.t.x,y:d.t.y-H},r:{x:d.r.x,y:d.r.y-H},b:{x:d.b.x,y:d.b.y-H},l:{x:d.l.x,y:d.l.y-H}};
  ctx.beginPath();ctx.moveTo(d.l.x,d.l.y);ctx.lineTo(d.b.x,d.b.y);ctx.lineTo(tp.b.x,tp.b.y);ctx.lineTo(tp.l.x,tp.l.y);ctx.closePath();
  ctx.fillStyle=sh(PLUM,hl?0.78:0.6);ctx.fill();

let lanes=[];const particles=[];let spawnTimer=0;
function buildLanes(){
  lanes=[];particles.length=0;spawnTimer=0;
  const kkey=(x,y)=>x+","+y;
  let sources=[];youCells.forEach(c=>DIRS.forEach(([dx,dy])=>{if(isRoad(c[0]+dx,c[1]+dy))sources.push([c[0]+dx,c[1]+dy]);}));
  for(let rad=1;rad<=5&&!sources.length;rad++)youCells.forEach(c=>{for(let dx=-rad;dx<=rad;dx++)for(let dy=-rad;dy<=rad;dy++)
    if(Math.max(Math.abs(dx),Math.abs(dy))===rad){const nx=c[0]+dx,ny=c[1]+dy;if(isRoad(nx,ny))sources.push([nx,ny]);}});
  const parent=new Map(),dist=new Map(),q=[];let head=0;
  sources.forEach(s=>{const k=kkey(s[0],s[1]);if(!dist.has(k)){dist.set(k,0);parent.set(k,null);q.push(s);}});
  while(head<q.length){const cur=q[head++],k=kkey(cur[0],cur[1]);
    DIRS.forEach(([dx,dy])=>{const nx=cur[0]+dx,ny=cur[1]+dy;if(isRoad(nx,ny)){const nk=kkey(nx,ny);
      if(!dist.has(nk)){dist.set(nk,dist.get(k)+1);parent.set(nk,cur);q.push([nx,ny]);}}});}
  people.forEach((p,idx)=>{if(!p.cell)return;let entry=null;
    for(let rad=1;rad<=2&&!entry;rad++)for(let dx=-rad;dx<=rad&&!entry;dx++)for(let dy=-rad;dy<=rad&&!entry;dy++){
      const nx=p.cell[0]+dx,ny=p.cell[1]+dy;if(isRoad(nx,ny)&&dist.has(kkey(nx,ny)))entry=[nx,ny];}
    if(!entry)return;
    const chain=[];let cur=entry,guard=0;
    while(cur&&guard++<400){chain.push([cur[0],cur[1]]);cur=parent.get(kkey(cur[0],cur[1]));}
    const cells=[[p.cell[0],p.cell[1]],...chain,[YCX,YCY]];
    if(cells.length>=2)lanes.push({idx,cells,L:cells.length-1});});}
function dirScore(p,which){const b=which==="in"?p.inbound:p.outbound;
  return b.replies*W.replies+b.recasts*W.recasts+b.mentions*W.mentions+b.likes*W.likes;}
function pickType(counts){let tot=0;K.forEach(k=>tot+=counts[k]);if(tot<=0)return"likes";
  let r=rng()*tot;for(const k of K){r-=counts[k];if(r<=0)return k;}return"likes";}
function spawnOne(){
  if(!lanes.length)return;const cand=[];let tot=0;
  lanes.forEach(ln=>{const p=people[ln.idx];
    if(scope!=="outbound"){const w=dirScore(p,"in")+0.6;cand.push({ln,dir:"in",p,w});tot+=w;}
    if(scope!=="inbound"){const w=dirScore(p,"out")+0.6;cand.push({ln,dir:"out",p,w});tot+=w;}});
  if(tot<=0)return;let r=rng()*tot,c=cand[0];for(const x of cand){r-=x.w;if(r<=0){c=x;break;}}
  const counts=c.dir==="in"?c.p.inbound:c.p.outbound;
  particles.push({cells:c.ln.cells,L:c.ln.L,dir:c.dir,u:c.dir==="in"?0:c.ln.L,type:pickType(counts),spd:0.8+rng()*0.5});}
function stepParticles(dt){spawnTimer+=dt;const interval=0.22;
  while(spawnTimer>interval&&particles.length<46){spawnTimer-=interval;spawnOne();}
  for(let i=particles.length-1;i>=0;i--){const q=particles[i];q.u+=(q.dir==="in"?1:-1)*q.spd*dt;
    if((q.dir==="in"&&q.u>=q.L)||(q.dir==="out"&&q.u<=0))particles.splice(i,1);}}
function partGrid(q){const L=q.L;let s=Math.floor(q.u);if(s>=L)s=L-1;if(s<0)s=0;const f=q.u-s;
  return [q.cells[s][0]+(q.cells[s+1][0]-q.cells[s][0])*f, q.cells[s][1]+(q.cells[s+1][1]-q.cells[s][1])*f];}
function partAlpha(q){const prog=q.dir==="in"?q.u/q.L:1-q.u/q.L;
  return prog>0.78?Math.max(0,(1-prog)/0.22):(prog<0.12?prog/0.12:1);}

  ctx=_ctx;CW=_CW;CH=_CH;dpr=_dpr;off=_off;zoom=_zoom;hit=_hit;bobPhase=_bob;particles.length=0;capturing=false;
  try{const blob=await new Promise((res,rej)=>{gif.on("finished",res);gif.on("abort",()=>rej(new Error("abort")));gif.render();});
    return await new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(blob);});}catch(e){return null;}}
async function uploadImage(dataUrl){if(!IMGBB_KEY||!dataUrl)return null;
  try{const fd=new FormData();fd.append("image",dataUrl.split(",")[1]);
    const r=await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`,{method:"POST",body:fd});
    if(!r.ok)return null;const j=await r.json();return (j&&j.data&&j.data.url)||null;}catch(e){return null;}}
async function doCast(){const text=castText();shareBtn.disabled=true;
  let embeds=[APP_URL];
  try{shareBtn.textContent="rendering\u2026";let media=await captureGif();
    if(!media)media=captureCity();
    shareBtn.textContent="uploading\u2026";const hosted=await uploadImage(media);if(hosted)embeds=[hosted,APP_URL];}catch(e){}
  shareBtn.disabled=false;
  try{if(sdk&&sdk.actions&&sdk.actions.composeCast){sdk.actions.composeCast({text,embeds});setShare(false);return;}}catch(e){}
  const q=embeds.map(u=>`&embeds[]=${encodeURIComponent(u)}`).join("");
  window.open(`https://farcaster.xyz/~/compose?text=${encodeURIComponent(text)}${q}`,"_blank","noopener");setShare(false);}
shareBtn.addEventListener("click",()=>{shareMode?doCast():setShare(true);});
cancelBtn.addEventListener("click",()=>setShare(false));

/* boot — draw the scene immediately so there's no blank/flash, then load data in */
resize();showPanel(null);requestAnimationFrame(loop);
allPeople=(await loadCity(viewer)).slice(0,MAX_CITY);
applyWindow();
})();
